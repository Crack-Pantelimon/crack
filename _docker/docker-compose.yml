name: crack

networks:
  default:
    name: crack-docker-net
    external: true

volumes:
  crack-dev-root-dir:
    name: crack-dev-root-dir
  crack-dev-target-dir:
    name: crack-dev-target-dir
  crack-harness-data:
    name: crack-harness-data
  ollama-data:
    name: ollama-data
  milvus-etcd-data:
    name: milvus-etcd-data
  milvus-minio-data:
    name: milvus-minio-data
  milvus-data:
    name: milvus-data
  falkordb-data:
    name: falkordb-data

services:
  crack_nginx_data:
    container_name: crack_nginx_data
    image: docker.io/nginx:1.30.2
    volumes:
      - type: bind
        source: ../_data/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - ../_data/:/data:ro
      - ../crack_demo/demo_resolution_selector_web_bevy/dist:/dist:ro
    ports:
      - 127.0.0.1:1973:1973
    restart: always

  ollama:
    container_name: ollama
    image: docker.io/ollama/ollama:0.9.6
    volumes:
      - ollama-data:/root/.ollama
    devices:
      - nvidia.com/gpu=all
    ports:
      - 127.0.0.1:11434:11434
    restart: unless-stopped

  falkordb:
    container_name: falkordb
    image: docker.io/falkordb/falkordb:latest
    volumes:
      - falkordb-data:/data
    ports:
      - 127.0.0.1:6379:6379
    restart: unless-stopped

  falkordb-browser:
    container_name: falkordb-browser
    image: docker.io/falkordb/falkordb-browser:latest
    environment:
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
    ports:
      - 127.0.0.1:3000:3000
    depends_on:
      - falkordb
    restart: unless-stopped

  graphiti-mcp:
    container_name: graphiti-mcp
    # standalone = MCP only (no embedded FalkorDB/browser); we run those as siblings.
    image: docker.io/zepai/knowledge-graph-mcp:standalone
    volumes:
      - type: bind
        source: ./graphiti-mcp-config.yaml
        target: /app/mcp/config/config.yaml
        read_only: true
    environment:
      FALKORDB_URI: redis://falkordb:6379
      FALKORDB_DATABASE: graphiti
      GRAPHITI_GROUP_ID: crack-repo
      # Config yaml expands OPENAI_API_URL (not OPENAI_BASE_URL).
      OPENAI_API_URL: http://ollama:11434/v1
      OPENAI_API_KEY: ollama
      OPENAI_BASE_URL: http://ollama:11434/v1
      MODEL_NAME: deepseek-r1:7b
      GRAPHITI_TELEMETRY_ENABLED: "false"
      TELEMETRY_ENABLED: "false"
      DO_NOT_TRACK: "1"
      SEMAPHORE_LIMIT: "3"
      BROWSER: "0"
    ports:
      - 127.0.0.1:8000:8000
    depends_on:
      - falkordb
      - ollama
    restart: unless-stopped

  milvus-etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus-etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped

  milvus-minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    restart: unless-stopped

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - 127.0.0.1:19530:19530
      - 127.0.0.1:9091:9091
    restart: unless-stopped

  crack-dev:
    container_name: crack-dev
    image: localhost/crack-dev:latest
    build:
      context: ./image
      dockerfile: Dockerfile
    volumes:
      - ../:/workspace
      - crack-dev-root-dir:/root
      - crack-dev-target-dir:/workspace/target
      - crack-harness-data:/crack-harness-data
      - ${HOST_PODMAN_SOCK}:/run/podman/podman.sock
    environment:
      CONTAINER_HOST: unix:///run/podman/podman.sock
      CRACK_HOST_REPO_ROOT: ${CRACK_HOST_REPO_ROOT}
      CRACK_HARNESS_DATA_DIR: /crack-harness-data
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
      FALKORDB_DATABASE: graphiti
      OLLAMA_HOST: http://ollama:11434
      OPENAI_API_KEY: ollama
      OPENAI_BASE_URL: http://ollama:11434/v1
      GRAPHITI_LLM_MODEL: deepseek-r1:7b
      GRAPHITI_EMBEDDING_MODEL: all-minilm
      GRAPHITI_EMBEDDING_DIMENSION: "384"
      GRAPHITI_TELEMETRY_ENABLED: "false"
      TELEMETRY_ENABLED: "false"
      DO_NOT_TRACK: "1"
    ports:
      - 127.0.0.1:9847:9847
      - 127.0.0.1:21122:22
      - 127.0.0.1:9930:9930
      - 127.0.0.1:9931:9931
      - 127.0.0.1:9932:9932
      - 127.0.0.1:9877:9877
    command: ["/bin/bash", "_docker/_cont_start.sh"]
    init: true
    restart: unless-stopped
