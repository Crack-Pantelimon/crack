services:
  crack_nginx:
    container_name: crack_nginx
    image: docker.io/nginx:1.30.2
    volumes:
      - type: bind
        source: ./nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    # ports:
      # - 80:80
    network_mode: host

